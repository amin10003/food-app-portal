<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu"
    />
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    :root {
      --font-heading:
        "Montserrat", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, sans-serif;
      --font-body:
        "Nunito", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, sans-serif;
    }

    body {
      font-family: var(--font-body);
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: var(--font-heading);
    }
    .material-symbols-outlined {
      font-variation-settings:
        "FILL" 0,
        "wght" 400,
        "GRAD" 0,
        "opsz" 24;
    }
  </style>
  <body>
    <div id="container" class="bg-[#9B0F06]">
      <header
        class="flex justify-between items-center bg-[#D53E0F] P-6 text-white px-6 h-14 top-0"
      >
        <div id="logo" class="flex gap-2 items-center font-bolder">
          <img
            src="images/food-logo-png6.png"
            alt="logo"
            class="h-10 w-10 rounded"
          />
          <h1 class="text-2xl">ILEYS</h1>
        </div>
        <nav class="hidden sm:block lg:block xl:block">
          <ul class="flex justify-between gap-6">
            <li><a href="home">Home</a></li>
            <li><a href="home">About</a></li>
            <li><a href="home">Services</a></li>
            <li><a href="home">Contacts</a></li>
          </ul>
        </nav>
        <div
          id="smallnav"
          class="sm:hidden xl:hidden lg:hidden group group-hover:block"
        >
          <button>
            <span class="material-symbols-outlined"> menu </span>
          </button>

          <nav class="hidden">
            <ul class="flex flex-col justify-between gap-6 text-white">
              <li><a href="home" class="block">Home</a></li>
              <li><a href="home" class="block">About</a></li>
              <li><a href="home" class="block">Services</a></li>
              <li><a href="home" class="block">Contacts</a></li>
            </ul>
          </nav>
        </div>
      </header>

    
    </div>
  </body>
</html>
