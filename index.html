<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=menu"
    />
  </head>
  <style>
    .material-symbols-outlined {
      font-variation-settings:
        "FILL" 0,
        "wght" 400,
        "GRAD" 0,
        "opsz" 24;
    }
  </style>
  <body>
    <div id="container" class="bg-[#Ed9b] m-4 p-6 h-screen">
      <header class="bg-[#D53E0F] sm:px-4 md:px-6 lg:px-6 sm:items-center text-white h-14 sm:h-24  items-center">
        <nav id="smallnav" class="bg-[#D53E0F]">
          <div
            class="sm:hidden xl:hidden lg:hidden relative flex justify-between items-center px-4 pt-2"
          >
            <div id="logo" class="flex gap-2 items-center font-bold">
              <img
                src="images/food-logo-png6.png"
                alt="logo"
                class="h-10 w-10 rounded"
              />
              <h1 class="text-2xl">ILEYS</h1>
            </div>
            <!-- grouped elements -->
            <div class="group relative">
              <button class="md:hidden lg:hidden xl:hidden">
                <span class="material-symbols-outlined"> menu </span>
              </button>

              <div
                class="absolute top-full right-0 hidden group-hover:block space-y-2 bg-[#9B0F06]"
              >
                <a href="/" class="block p-2">Home</a>
                <a href="aboutUs.html" class="block p-2">About</a>
                <a href="Services.html" class="block p-2">Services</a>
                <a href="Contaacts.html" class="block p-2">Contacts</a>
              </div>
            </div>
          </div>
        </nav>

        <!-- bignav -->

        <nav class="hidden sm:block lg:block xl:block">
          <div
            class="flex justify-between items-center bg-[#D53E0F] Px-6 text-white px-6 h-14"
          >
            <div id="logo" class="flex gap-2 items-center font-bolder">
              <img
                src="images/food-logo-png6.png"
                alt="logo"
                class="h-10 w-10 rounded"
              />
              <h1 class="text-2xl">ILEYS</h1>
            </div>
            <ul class="flex justify-between gap-6 font-bold">
              <li><a href="/" class="hover:border-b-2">Home</a></li>
              <li><a href="abouUs.html" class="hover:border-b-2">About</a></li>
              <li>
                <a href="services.html" class="hover:border-b-2">Services</a>
              </li>
              <li>
                <a href="contacts.html" class="hover:border-b-2">Contacts</a>
              </li>
            </ul>
          </div>
        </nav>
      </header>
      <!-- maain -->
      <main class="sm:mt-20 md:mt-20 lg:mt-20 xl:mt-20">
        <!-- hero for mobile -->
        <section
          id="hero"
          class="flex justify-between text-white items-center sm:hidden md:hidden lg:hidden xl:hidden bg-[#D53E0F] border-b-2 rounded-b-xl"
        >
          <div
            id="sectiondiv"
            class="flex gap-4 rounded-xl items-center h-[50%] px-4 py-4"
          >
            <p
              class="w-half h-full item-center mt-[18px] text-center justify-center font-bold text-2xl"
            >
              TASTE THE TASTY!
            </p>
            <div id="herom-img" class="w-half rounded-xl">
              <img
                src="images/humburger.jpg"
                alt="hero-img"
                class="w-full h-full rounded-full"
              />
            </div>
          </div>
        </section>

        <!-- hero for large devices -->
        <section
          id="hero2"
          class="flex justify-between text-white items-center hidden sm:block md:block lg:block xl:block  border-b-2 rounded-b-xl bg-[#9B0F06]"
        >
          <div
            id="sectiondiv"
            class="flex gap-4 rounded-xl items-center max-h-80vh px-4 py-4"
          >
            <p
              class="w-[50%] h-full item-center mt-[18px] text-center justify-center font-bold text-2xl"
            >
              TASTE THE TASTY!
            </p>
            <div id="herom-img" class="w-half rounded-xl">
              <img
                src="images/humburger.jpg"
                alt="hero-img"
                class="w-full h-full rounded-xl"
              />
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
